name: Build with random name

on:
  push:
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate random name
        id: random
        run: |
          RANDOM_STRING=$(openssl rand -hex 6)   # 生成 12 位十六进制随机数
          echo "random_name=$RANDOM_STRING" >> $GITHUB_OUTPUT

      - name: Build with Gradle (pass random name)
        run: |
          ./gradlew jar -PrandomName=${{ steps.random.outputs.random_name }}
          # 如果任务是 dll，则改为 ./gradlew dll -PrandomName=...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact-${{ steps.random.outputs.random_name }}
          path: build/libs/*.jar   # 根据实际输出目录调整
          # 如果生成 DLL，路径可能是 build/dll/ 等
